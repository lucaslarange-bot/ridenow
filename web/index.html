<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>RideNow</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root{
      --bg:#0b0d12; --panel:#141821; --panel2:#1c212d; --line:#2a3140;
      --txt:#eef1f6; --muted:#8b95a7; --accent:#00d18f; --accent2:#0a84ff;
      --danger:#ff4d5e; --warn:#ffb020; --radius:16px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body,#root{height:100%}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);overflow:hidden}
    button{font-family:inherit;cursor:pointer;border:none;border-radius:12px;font-weight:600;transition:.15s}
    button:active{transform:scale(.97)}
    .app{position:relative;height:100%;width:100%}
    #map{position:absolute;inset:0;z-index:1}
    .leaflet-container{background:#20242e}

    /* ---- Landing (choix du role) ---- */
    .landing{position:absolute;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;background:radial-gradient(1200px 600px at 50% -10%, #10233a 0%, var(--bg) 60%);padding:24px}
    .logo{font-size:44px;font-weight:800;letter-spacing:-1.5px}
    .logo span{color:var(--accent)}
    .tag{color:var(--muted);margin-top:-14px}
    .roles{display:flex;gap:18px;flex-wrap:wrap;justify-content:center}
    .role-card{width:230px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:26px 22px;text-align:center;display:flex;flex-direction:column;gap:10px;align-items:center}
    .role-card .ico{font-size:40px}
    .role-card h3{font-size:20px}
    .role-card p{color:var(--muted);font-size:13px;line-height:1.4}
    .role-card button{margin-top:8px;background:var(--accent);color:#04241a;padding:12px 20px;width:100%;font-size:15px}
    .role-card.driver button{background:var(--accent2);color:#fff}
    .field{width:100%;margin-top:6px}
    .field input{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:11px 12px;border-radius:10px;font-size:14px}

    /* ---- Panneau bas (bottom sheet) ---- */
    .sheet{position:absolute;left:0;right:0;bottom:0;z-index:20;background:var(--panel);border-top-left-radius:22px;border-top-right-radius:22px;border-top:1px solid var(--line);box-shadow:0 -12px 40px rgba(0,0,0,.45);padding:16px 16px calc(16px + env(safe-area-inset-bottom));max-height:70%;display:flex;flex-direction:column;gap:12px}
    .sheet .grab{width:42px;height:5px;border-radius:3px;background:#39414f;margin:2px auto 4px}
    .row{display:flex;align-items:center;gap:10px}
    .between{justify-content:space-between}
    .badge{font-size:12px;padding:4px 10px;border-radius:999px;background:var(--panel2);color:var(--muted);border:1px solid var(--line)}
    .badge.on{color:var(--accent);border-color:var(--accent)}
    .title{font-size:17px;font-weight:700}
    .muted{color:var(--muted);font-size:13px}
    .btn-primary{background:var(--accent);color:#04241a;padding:14px;font-size:16px;width:100%}
    .btn-blue{background:var(--accent2);color:#fff;padding:14px;font-size:16px;width:100%}
    .btn-danger{background:transparent;color:var(--danger);border:1px solid var(--danger);padding:12px;width:100%}
    .btn-ghost{background:var(--panel2);color:var(--txt);border:1px solid var(--line);padding:12px;width:100%}
    .est{display:flex;gap:10px}
    .est .box{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:10px;text-align:center}
    .est .box b{font-size:19px;display:block}
    .est .box small{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.4px}
    .toggle{display:flex;background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:4px;width:100%}
    .toggle button{flex:1;background:transparent;color:var(--muted);padding:9px}
    .toggle button.active{background:var(--accent2);color:#fff}
    .driver-info{display:flex;align-items:center;gap:12px;background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:12px}
    .avatar{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:#04241a}
    .req-item{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:12px;display:flex;flex-direction:column;gap:8px}
    .status-pill{align-self:flex-start;font-size:12px;font-weight:700;padding:5px 12px;border-radius:999px;background:#0f2a22;color:var(--accent)}

    /* ---- Chat ---- */
    .chat-toggle{position:absolute;right:14px;bottom:calc(76px + env(safe-area-inset-bottom));z-index:30;width:56px;height:56px;border-radius:50%;background:var(--accent2);color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(10,132,255,.5)}
    .chat-badge{position:absolute;top:-4px;right:-4px;background:var(--danger);color:#fff;font-size:11px;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 5px}
    .chat{position:absolute;inset:0;z-index:60;background:var(--bg);display:flex;flex-direction:column}
    .chat-head{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line);background:var(--panel)}
    .chat-head button{background:none;color:var(--txt);font-size:22px;width:32px}
    .chat-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
    .msg{max-width:76%;padding:9px 13px;border-radius:16px;font-size:14px;line-height:1.35;word-wrap:break-word}
    .msg.me{align-self:flex-end;background:var(--accent2);color:#fff;border-bottom-right-radius:5px}
    .msg.them{align-self:flex-start;background:var(--panel2);border:1px solid var(--line);border-bottom-left-radius:5px}
    .msg small{display:block;opacity:.6;font-size:10px;margin-top:3px}
    .chat-input{display:flex;gap:8px;padding:12px;border-top:1px solid var(--line);background:var(--panel)}
    .chat-input input{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:12px 14px;border-radius:999px;font-size:14px}
    .chat-input button{background:var(--accent2);color:#fff;width:48px;height:48px;border-radius:50%;font-size:20px}

    .hint{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:15;background:rgba(20,24,33,.92);border:1px solid var(--line);color:var(--txt);padding:9px 16px;border-radius:999px;font-size:13px;backdrop-filter:blur(8px);white-space:nowrap;max-width:92vw}
    .topbar{position:absolute;top:14px;left:14px;z-index:15}
    .topbar button{background:rgba(20,24,33,.92);border:1px solid var(--line);color:var(--txt);padding:9px 14px;border-radius:999px;font-size:13px;backdrop-filter:blur(8px)}
    .spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .8s linear infinite;vertical-align:-2px;margin-right:6px}
    @keyframes sp{to{transform:rotate(360deg)}}
    .pulse{animation:pl 1.6s ease-in-out infinite}
    @keyframes pl{0%,100%{opacity:1}50%{opacity:.5}}
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="config.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" src="app.jsx" data-presets="react"></script>
</body>
</html>
